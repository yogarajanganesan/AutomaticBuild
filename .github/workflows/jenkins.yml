name: Jenkins Trigger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  jenkins-build:
    runs-on: self-hosted

    steps:
      - name: Trigger Jenkins Job
        run: |
          curl -X POST "${{ secrets.JENKINS_URL }}/job/AutomaticBuild/build" \
            --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}"

      - name: Wait for Jenkins Build
        run: |
          echo "Waiting 60 seconds for Jenkins build to complete..."
          sleep 60

      - name: Check Jenkins Result
        run: |
          RESULT=$(curl -s \
            --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}" \
            "http://192.168.1.4:8082/job/AutomaticBuild/lastBuild/api/json" \
            | jq -r '.result')

          echo "Jenkins Result: $RESULT"

          if [ "$RESULT" != "SUCCESS" ]; then
            echo "Jenkins build failed or SonarQube Quality Gate failed"
            exit 1
          fi

          echo "Jenkins build successful"