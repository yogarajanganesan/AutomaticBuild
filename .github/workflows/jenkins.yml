name: Jenkins Trigger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  jenkins-build:
    runs-on: self-hosted

    steps:

      - name: Show Runner Information
        shell: pwsh
        run: |
          Write-Host "Runner Name: $env:RUNNER_NAME"
          Write-Host "Machine Name: $env:COMPUTERNAME"

      - name: Trigger Jenkins Job
        shell: pwsh
        run: |
          $pair = "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}"
          $base64 = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes($pair))

          Invoke-WebRequest `
            -Uri "${{ secrets.JENKINS_URL }}/job/AutomaticBuild/build" `
            -Method POST `
            -Headers @{ Authorization = "Basic $base64" }

          Write-Host "Jenkins job triggered successfully."

      - name: Wait for Jenkins Build
        shell: pwsh
        run: |
          Write-Host "Waiting for Jenkins build..."
          Start-Sleep -Seconds 30

      - name: Get Jenkins Build Result
        shell: pwsh
        run: |
          $pair = "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}"
          $base64 = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes($pair))

          $response = Invoke-RestMethod `
            -Uri "${{ secrets.JENKINS_URL }}/job/AutomaticBuild/lastBuild/api/json" `
            -Headers @{ Authorization = "Basic $base64" }

          $buildNumber = $response.number
          $result = $response.result

          Write-Host "Build Number: $buildNumber"
          Write-Host "Build Result: $result"

          $buildUrl = "${{ secrets.JENKINS_URL }}/job/AutomaticBuild/$buildNumber"

          if ($result -eq "SUCCESS") {
              Write-Host "Jenkins build successful."
              exit 0
          }

          Write-Host "Jenkins build failed."
          Write-Host ""
          Write-Host "Console Log:"
          Write-Host "$buildUrl/console"
          Write-Host ""
          Write-Host "Test Report:"
          Write-Host "$buildUrl/testReport/"
          Write-Host ""
          Write-Host "SonarQube Dashboard:"
          Write-Host "${{ secrets.SONARQUBE_URL }}/dashboard?id=AutomaticBuild"

          exit 1