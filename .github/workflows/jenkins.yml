name: Jenkins Trigger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  jenkins-build:
    runs-on: windows-latest

    steps:
      - name: Trigger Jenkins Job
        shell: pwsh
        run: |
          Write-Host "Triggering Jenkins job..."

          $pair = "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}"
          $base64 = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes($pair))

          Invoke-WebRequest `
            -Uri "${{ secrets.JENKINS_URL }}/job/AutomaticBuild/build" `
            -Method POST `
            -Headers @{ Authorization = "Basic $base64" }

          Write-Host "Jenkins job triggered."

      - name: Wait for Jenkins Build
        shell: pwsh
        run: |
          Start-Sleep -Seconds 60

      - name: Check Jenkins Result
        shell: pwsh
        run: |
          $pair = "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}"
          $base64 = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes($pair))

          $response = Invoke-RestMethod `
            -Uri "${{ secrets.JENKINS_URL }}/job/AutomaticBuild/lastBuild/api/json" `
            -Headers @{ Authorization = "Basic $base64" }

          $result = $response.result
          $buildNumber = $response.number

          Write-Host "Build Number: $buildNumber"
          Write-Host "Jenkins Result: $result"

          if ($result -eq "SUCCESS") {
            Write-Host "Jenkins build successful."
            exit 0
          }

          $buildUrl = "${{ secrets.JENKINS_URL }}/job/AutomaticBuild/$buildNumber"

          Write-Host "::error::Jenkins build failed"
          Write-Host "::error::Console Log: $buildUrl/console"
          Write-Host "::error::Test Report: $buildUrl/testReport/"
          Write-Host "::error::SonarQube Dashboard: ${{ secrets.SONARQUBE_URL }}/dashboard?id=AutomaticBuild"

          exit 1